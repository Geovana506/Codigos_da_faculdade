<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title> Calculadora de Bhaskara</title>
</head>
<body>

    <h2>Calculadora de Bhaskara</h2>

    <form method="POST">
        <label>a:</label>
        <input type="number" step="any" name="a" required><br><br>

        <label>b:</label>
        <input type="number" step="any" name="b" required><br><br>

        <label>c:</label>
        <input type="number" step="any" name="c" required><br><br>

        <button type="submit">Calcular</button>
    </form>

    {% if resultado %}
        <h3>Resultado:</h3>
        <p>{{ resultado }}</p>
    {% endif %}

</body>
</html>
